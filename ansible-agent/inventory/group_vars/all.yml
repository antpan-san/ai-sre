# 基础配置
arch_version: "amd64"
# 内网制品下载：仅此一处为默认主机名/IP，不写死在 Go/前端；部署时可由 OpsFleet 合并块或 UI 覆盖 download_domain / download_protocol。
# 镜像站目录约定（示例）： kubernetes/<ver>/<arch>/... 、 etcd/<ver>/... 、 cni-plugins/<ver>/... （与下方 URL 模板一致）
download_protocol: "http://"
download_domain: "192.168.56.11"
# 持久缓存：跨多次 install.sh / 测试复用已下载 tarball（get_url 与 checksum 一致则跳过）
local_cache_dir: "/var/cache/opsfleet-k8s"
remote_dest: "/usr/local"
k8s_base_dir: "/etc/kubernetes"

# Kubernetes 配置
kubernetes_version: "v1.35.0"
k8s_package_name: "kubernetes-server-linux-{{ arch_version }}"
k8s_package_tar: "{{ local_cache_dir }}/{{ k8s_package_name }}.tar.gz"
# 与 kubernetes-server-linux-*.tar.gz 解压目录一致（在 local_cache_dir 下，而非 /usr/local/kubernetes）
k8s_extract_dir: "{{ local_cache_dir }}/kubernetes"
k8s_checksum: "23af53c49de841a0d5c19d9525d820cecc9d55367c132296a5f381d051438bf06dcddff3d0236df8ba6011a6aa5d0ffc31960d277c7f53a0ad98e66d6f8d6a0a"
# 服务端二进制 tarball（内网 mirror 布局；UI 选择「阿里云」时由 OpsFleet 覆盖为 dl.k8s.io / GitHub）
k8s_server_tarball_url: "{{ download_protocol }}{{ download_domain }}/kubernetes/{{ kubernetes_version }}/{{ arch_version }}/{{ k8s_package_name }}.tar.gz"
k8s_server_tarball_checksum: "sha512:{{ k8s_checksum }}"

# etcd 配置
etcd_version: "v3.6.7"
etcd_package_name: "etcd-{{ etcd_version }}-linux-{{ arch_version }}"
etcd_package_tar: "{{ local_cache_dir }}/{{ etcd_package_name }}.tar.gz"
etcd_download_url: "{{ download_protocol }}{{ download_domain }}/etcd/{{ etcd_version }}/{{ etcd_package_name }}.tar.gz"
etcd_data_dir: /var/lib/etcd
etcd_client_port: 2379
etcd_peer_port: 2380
etcd_systemd_file: "/etc/systemd/system/etcd.service"
etcd_bin_dir: "/usr/local/bin"
etcd_cluster_token: my-etcd-token
etcd_cluster_state: new

# etcd 证书配置
etcd_cert_base_dir: "/etc/kubernetes"
etcd_cert_dir: "{{ etcd_cert_base_dir }}/etcd"
etcd_server_cert: "{{ etcd_cert_dir }}/etcd_server.crt"
etcd_server_key: "{{ etcd_cert_dir }}/etcd_server.key"
etcd_peer_cert: "{{ etcd_cert_dir }}/etcd_peer.crt"
etcd_peer_key: "{{ etcd_cert_dir }}/etcd_peer.key"
etcd_ca_cert: "{{ etcd_cert_dir }}/etcd_ca.crt"

# Container 运行时配置
containerd_version: "2.2.1"
containerd_package_name: "containerd-{{ containerd_version }}-linux-{{ arch_version }}.tar.gz"
runc_version: "v1.4.0"
cni_plugins_version: "v1.9.0"

# Kubernetes 插件配置
calico_version: "v3.31.3"
coredns_version: "v1.13.1"
coredns_image: "registry.k8s.io/coredns/coredns:{{ coredns_version }}"

# Kubernetes 集群证书信息
# k8s_cert:
k8s_cert_dir: "{{ k8s_base_dir }}/pki"
ca_subject: "/CN=kubernetes-ca"
server_subject: "/CN=kubernetes"
ca_valid_days: 10000
server_valid_days: 10000
cert_validity: "+3650d"
master_ip: 10.10.120.142
service_cluster_ip: 10.96.0.1
dns_names:
  - kubernetes
  - kubernetes.default
  - kubernetes.default.svc
  - kubernetes.default.svc.cluster
  - kubernetes.default.svc.cluster.local
ipSANS: >-
  {{
    ['127.0.0.1', service_cluster_ip]
    + groups['kube_control_plane']
      | map('extract', hostvars, 'ansible_host')
      | list
  }}
advertise_address: "{{ ansible_host }}"
api_server_count: "{{ groups['kube_control_plane'] | length }}"
kube_apiserver_endpoint: "https://{{ master_ip }}:6443"

# controller_manager
controller_manager:
  kubeconfig: "{{ k8s_base_dir }}/controller-manager.kubeconfig"
  cert: "{{ k8s_cert_dir }}/controller-manager.crt"
  key: "{{ k8s_cert_dir }}/controller-manager.key"

k8s_api_server: "https://{{ master_ip }}:6443"

cluster_name: kubernetes

service_cluster_ip_range: "10.96.0.0/12"
pod_cluster_cidr: "10.244.0.0/16"
# 当前 playbooks/k8s_addons.yml 仅自动下发 Flannel（与 pod_cluster_cidr 对齐）；Calico 等需后续接入。
network_plugin: "flannel"
# 集群 DNS（kubelet / CoreDNS Service）
dns_service_ip: "10.96.0.10"
cluster_domain: "cluster.local"
# CNI 插件离线包（与内网制品站路径一致；选「阿里云」镜像源时由 OpsFleet 覆盖为 GitHub）
cni_plugins_download_url: "{{ download_protocol }}{{ download_domain }}/cni-plugins/{{ cni_plugins_version }}/cni-plugins-linux-{{ arch_version }}-{{ cni_plugins_version }}.tgz"
