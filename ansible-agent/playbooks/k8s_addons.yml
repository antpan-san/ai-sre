# Flannel + CoreDNS；需在首个 control plane 上可用 kubectl 与 admin.conf。
- hosts: kube_control_plane
  become: true
  pre_tasks:
    - name: Load OpsFleet K8s bundle group_vars (alongside inventory/hosts.ini)
      ansible.builtin.include_vars:
        file: "{{ inventory_dir }}/group_vars/all.yml"
  roles:
    - role: ../roles/k8s_addons
