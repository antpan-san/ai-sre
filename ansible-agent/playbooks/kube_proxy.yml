# 依赖：kubelet 已启动并能连上 API；为 ClusterIP / NodePort 提供 kube-proxy。
- hosts: k8s_cluster
  become: true
  pre_tasks:
    - name: Load OpsFleet K8s bundle group_vars (alongside inventory/hosts.ini)
      ansible.builtin.include_vars:
        file: "{{ inventory_dir }}/group_vars/all.yml"
  roles:
    - role: ../roles/kube_proxy
