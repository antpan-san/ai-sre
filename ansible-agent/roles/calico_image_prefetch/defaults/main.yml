---
# 与 inventory calico_version 一致；apply Calico manifest 之前在所有节点预拉取，
# 避免 DaemonSet init 在 quay.io 抖动时长时间 ImagePullBackOff，进而 CNI 半初始化
#（/var/lib/calico/nodename 不存在 → coredns / calico-kube-controllers CreatePodSandbox 失败）。
# ctr pull 在网络差的环境可能较慢；每次 pull 最多 (1 + retries) 次尝试，间隔 delay 秒。
calico_prefetch_retries: 8
calico_prefetch_delay: 20
# 拉取时使用的 registry（国内可设 quay.m.daocloud.io）；成功后会 ctr tag 到 quay.io/... 与上游 Calico YAML 中 image 字段一致。
calico_image_pull_registry: "quay.io"
# 与 manifest 一致，勿改，除非 patch_calico_manifest 同步改了 image 前缀
calico_image_canonical_registry: "quay.io"
