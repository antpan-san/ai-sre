---
- name: Skip Calico prefetch when not using Calico
  ansible.builtin.meta: end_host
  when: network_plugin | default('flannel') != 'calico'

- name: Pre-pull Calico CNI image (containerd k8s.io)
  ansible.builtin.command:
    cmd: "ctr -n k8s.io images pull quay.io/calico/cni:{{ calico_version }}"
  register: calico_pull_cni
  until: calico_pull_cni.rc == 0
  retries: "{{ calico_prefetch_retries | int }}"
  delay: "{{ calico_prefetch_delay | int }}"
  failed_when: false
  changed_when: calico_pull_cni.rc == 0

- name: Pre-pull Calico node image
  ansible.builtin.command:
    cmd: "ctr -n k8s.io images pull quay.io/calico/node:{{ calico_version }}"
  register: calico_pull_node
  until: calico_pull_node.rc == 0
  retries: "{{ calico_prefetch_retries | int }}"
  delay: "{{ calico_prefetch_delay | int }}"
  failed_when: false
  changed_when: calico_pull_node.rc == 0

- name: Pre-pull Calico kube-controllers image
  ansible.builtin.command:
    cmd: "ctr -n k8s.io images pull quay.io/calico/kube-controllers:{{ calico_version }}"
  register: calico_pull_ctrl
  until: calico_pull_ctrl.rc == 0
  retries: "{{ calico_prefetch_retries | int }}"
  delay: "{{ calico_prefetch_delay | int }}"
  failed_when: false
  changed_when: calico_pull_ctrl.rc == 0

- name: Fail with OPSFLEET_K8S_E_CALICO_PREFETCH_FAILED if any Calico image missing
  ansible.builtin.fail:
    msg: |
      [ERROR-CODE] OPSFLEET_K8S_E_CALICO_PREFETCH_FAILED
      节点 {{ inventory_hostname }} 无法在 {{ (calico_prefetch_retries | int) * (calico_prefetch_delay | int) }}s 量级的重试窗口内拉齐 Calico 镜像（quay.io/calico/*:{{ calico_version }}）。
      cni rc={{ calico_pull_cni.rc | default(-1) }} stderr={{ calico_pull_cni.stderr | default('') | truncate(400) }}
      node rc={{ calico_pull_node.rc | default(-1) }} stderr={{ calico_pull_node.stderr | default('') | truncate(400) }}
      kube-controllers rc={{ calico_pull_ctrl.rc | default(-1) }} stderr={{ calico_pull_ctrl.stderr | default('') | truncate(400) }}
      根因：registry 不可达或限流；Calico DaemonSet init 会长期 ImagePullBackOff，主机缺少 /var/lib/calico/nodename，其它 Pod CreatePodSandbox 报 CNI calico 失败。
  when: >-
    (calico_pull_cni.rc | default(1)) != 0
    or (calico_pull_node.rc | default(1)) != 0
    or (calico_pull_ctrl.rc | default(1)) != 0
