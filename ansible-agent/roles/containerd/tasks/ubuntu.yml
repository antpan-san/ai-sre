---
- name: Install containerd and runc (Ubuntu)
  ansible.builtin.apt:
    name:
      - containerd
      - runc
    state: present
    update_cache: true

# apt 包有时不会预先创建 /etc/containerd，重定向写 config.toml 会报 Directory nonexistent
- name: Ensure /etc/containerd directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Ensure containerd config exists
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml
  changed_when: true
  notify: Restart containerd

- name: Set SystemdCgroup = true for kubelet (match cgroupDriver=systemd)
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup\s*=\s*false'
    replace: "SystemdCgroup = true"
  notify: Restart containerd

# 兼容 containerd v1（sandbox_image = "...")  与 v2（[...pinned_images].sandbox = '...'）两套 schema
# 都把 pause 标签对齐成 pause_image_tag——确保 ctr import 的镜像和 CRI 实际请求的 tag 一致。
- name: Align containerd CRI sandbox image with pause_image_tag (v1 schema)
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: 'sandbox_image\s*=\s*"[^"]*"'
    replace: 'sandbox_image = "{{ pause_image_tag }}"'
  notify: Restart containerd

- name: Align containerd CRI sandbox image with pause_image_tag (v2 schema pinned_images.sandbox)
  ansible.builtin.replace:
    path: /etc/containerd/config.toml
    regexp: "sandbox\\s*=\\s*'[^']*'"
    replace: "sandbox = '{{ pause_image_tag }}'"
  notify: Restart containerd

- name: Enable and start containerd
  ansible.builtin.systemd_service:
    name: containerd
    state: started
    enabled: true
    daemon_reload: true
