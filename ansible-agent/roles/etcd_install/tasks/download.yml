- name: Ensure local cache dir exists on control node
  ansible.builtin.file:
    path: "{{ local_cache_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Stat etcd tarball in persistent cache
  ansible.builtin.stat:
    path: "{{ etcd_package_tar }}"
  register: etcd_tar_stat
  delegate_to: localhost
  run_once: true

- name: Report etcd cache status
  ansible.builtin.debug:
    msg: "etcd tarball exists={{ etcd_tar_stat.stat.exists | default(false) }} path={{ etcd_package_tar }}"
  delegate_to: localhost
  run_once: true

- name: Show etcd tarball URL (静默 curl + stderr 首尾摘要)
  ansible.builtin.debug:
    msg: "Downloading etcd tarball: {{ etcd_download_url }} -> {{ etcd_package_tar }}"
  delegate_to: localhost
  run_once: true
  when: not (etcd_tar_stat.stat.exists | default(false))

- name: Download etcd tarball via helper (size>1MB sanity check; Ansible 无进度条)
  ansible.builtin.command:
    cmd: "bash {{ opsfleet_download_helper }} {{ etcd_download_url }} {{ etcd_package_tar }} '' 1048576"
  environment: "{{ opsfleet_download_env | default({'OPSFLEET_NO_PROGRESS': '1'}, true) }}"
  register: etcd_dl
  changed_when: "'下载完成' in (etcd_dl.stderr | default(''))"
  failed_when: etcd_dl.rc not in [0]
  delegate_to: localhost
  run_once: true
  when: not (etcd_tar_stat.stat.exists | default(false))

- name: Show etcd tarball download summary
  ansible.builtin.debug:
    msg: "{{ etcd_dl.stderr_lines | default([]) }}"
  delegate_to: localhost
  run_once: true
  when: etcd_dl.stderr_lines is defined and (etcd_dl.stderr_lines | length) > 0

- name: Extract etcd tarball on control node
  ansible.builtin.unarchive:
    src: "{{ etcd_package_tar }}"
    dest: "{{ local_cache_dir }}"
    remote_src: no
  delegate_to: localhost
  run_once: true

