# =========================================================
# Etcd cluster health check (Idempotent, cluster-wide)
# =========================================================
# 在各 etcd 成员本机探测「本机 ansible_host:2379」（非 localhost）：
# - 控制机到各节点可能不可达；127.0.0.1 需额外监听且可能与 TLS/SAN 不一致。
# - etcd 已监听 https://ansible_host:2379，自连该 IP 即可。

- name: Wait for etcd client ports to be reachable (per member, self IP)
  ansible.builtin.wait_for:
    host: "{{ hostvars[item].ansible_host }}"
    port: "{{ etcd_client_port }}"
    timeout: 180
    delay: 5
  loop: "{{ groups['etcd'] }}"
  loop_control:
    label: "{{ item }}"
  delegate_to: "{{ item }}"
  run_once: true

- name: Check etcd endpoint health for each node
  block:
    - name: Run etcdctl endpoint health
      ansible.builtin.command:
        argv:
          - etcdctl
          - --endpoints=https://{{ hostvars[item].ansible_host }}:{{ etcd_client_port }}
          - --cacert={{ etcd_ca_cert }}
          - --cert={{ etcd_server_cert }}
          - --key={{ etcd_server_key }}
          - endpoint
          - health
      environment:
        ETCDCTL_API: "3"
      register: etcd_health_result
      retries: 5
      delay: 5
      until: etcd_health_result.rc == 0
      failed_when: etcd_health_result.rc != 0
      loop: "{{ groups['etcd'] }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ item }}"
      run_once: true

    - name: Show healthy endpoints
      ansible.builtin.debug:
        msg: "{{ item }} is healthy"
      loop: "{{ groups['etcd'] }}"
      loop_control:
        label: "{{ item }}"
      run_once: true

