- name: Ensure Data Directory
  file:
    path: "{{ etcd_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Distrubut System Service
  ansible.builtin.template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart etcd

      #- name: Reload systemd immediately if unit changed
      #  ansible.builtin.command: systemdctl daemon-reload
      #  changed_when: false

- name: Ensure Etcd Started
  ansible.builtin.systemd_service:
    name: etcd
    state: started
    daemon_reload: true
    enabled: true
