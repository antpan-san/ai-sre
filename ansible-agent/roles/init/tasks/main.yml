- name: Ensure ansible user exists
  user:
    name: ansible
    state: present
    shell: /bin/bash
    create_home: yes
    groups: sudo
    append: yes

- name: Create .ssh directory
  file:
    path: /home/ansible/.ssh
    state: directory
    mode: '0700'
    owner: ansible
    group: ansible

- name: Add SSH public key
  ansible.posix.authorized_key:
    user: ansible
    state: present
    key: "{{ lookup('file','/root/.ssh/ansible_id_rsa.pub') }}"

- name: Add ansible user to sudoers
  copy:
    dest: /etc/sudoers.d/ansible
    content: "ansible ALL=(ALL) NOPASSWD:ALL"
    owner: root
    group: root
    mode: '0440'





