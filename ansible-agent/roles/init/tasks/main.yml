- name: Check if swap is enabled
  ansible.builtin.command: swapon --summary
  register: swap_status
  changed_when: false
  failed_when: false

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  when: swap_status.stdout != ""

- name: Disable swap permanently in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\s*([^#].*\s+swap\s+.*)$'
    line: '# \1'
    backrefs: yes

- name: Set system hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Manage cluster hosts ectries
  blockinfile:
    path: /etc/hosts
    create: true
    marker: "# {mark} ANSIBLE MANAGED CLUSTER HOSTS"
    block: "{{ lookup('template', 'hosts.block.j2') }}"

