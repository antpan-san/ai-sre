- name: Ensure Binaries Directory Exsits
  file:
    path: "{{ remote_dest }}/bin"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Copy kubernetes server binaries
  ansible.builtin.copy:
    src: "{{ k8s_extract_dir }}/server/bin/{{ item }}"
    dest: "{{ remote_dest }}/bin/{{ item }}"
    mode: '0755'
    owner: root
    group: root
  with_items:
#    - kube-apiserver
    - kube-controller-manager
#    - kube-scheduler
#    - kube-proxy
#    - kubelet
#    - kubectl
#    - kubeadm


- name: Copy kube-controller-manager cert to node
  copy:
    src: "{{ k8s_cert_dir }}/kube_controller_manager.crt"
    dest: "{{ k8s_cert_dir }}/kube_controller_manager.crt"
    owner: root
    group: root
    mode: '0644'

- name: Copy kube-controller-manager key to node
  copy:
    src: "{{ k8s_cert_dir }}/kube_controller_manager.key"
    dest: "{{ k8s_cert_dir }}/kube_controller_manager.key"
    owner: root
    group: root
    mode: '0600'

- name: Copy k8s CA cert to node
  copy:
    src: "{{ k8s_cert_dir }}/k8s_ca.crt"
    dest: "{{ k8s_cert_dir }}/k8s_ca.crt"
    owner: root
    group: root
    mode: '0644'

- name: Install kube-controller-manager systemd unit
  when: control_plane_deploy_method | default('binary') == 'binary'
  template:
    src: kube-controller-manager.service.j2
    dest: /etc/systemd/system/kube-controller-manager.service
    mode: '0644'

- name: Reload systemd
  when: control_plane_deploy_method | default('binary') == 'binary'
  systemd:
    daemon_reload: true

- name: Enable and start kube-controller-manager
  when: control_plane_deploy_method | default('binary') == 'binary'
  systemd:
    name: kube-controller-manager
    enabled: true
    state: started

# --------------------------------
# Check Health（服务刚起时 10257 可能尚未监听，做轮询避免瞬时失败）
# K8s 1.30+ --controllers 须用 bootstrap-signer-controller / token-cleaner-controller；旧名会导致进程立即退出、10257 拒绝连接。
# --------------------------------
- name: Wait for controller-manager /healthz
  when: control_plane_deploy_method | default('binary') == 'binary'
  block:
    - name: Poll controller-manager /healthz
      ansible.builtin.uri:
        url: https://127.0.0.1:10257/healthz
        validate_certs: false
        return_content: true
        status_code: 200
      register: cm_health
      until: cm_health.status == 200 and (cm_health.content | default('') | trim) == 'ok'
      retries: 40
      delay: 3
    - name: Controller-manager health response
      ansible.builtin.debug:
        msg: "{{ cm_health.content | default('') | trim }}"
      when: cm_health.content is defined
  rescue:
    - name: Extract likely error lines from controller-manager journal
      ansible.builtin.shell: journalctl -u kube-controller-manager -n 800 --no-pager | grep -E "err=| E[0-9]{4} |Error:|FATAL|failed|unable to|Unable" | tail -40 || true
      register: cm_err_grep
      failed_when: false
      changed_when: false
    - name: Last 80 lines of controller-manager journal (for failures after long flag dump)
      ansible.builtin.command: journalctl -u kube-controller-manager -n 80 --no-pager
      register: cm_journal_tail
      changed_when: false
    - name: Fail with journal excerpt
      ansible.builtin.fail:
        msg: |
          kube-controller-manager 未在 10257 提供 /healthz（Connection refused 多为进程未启动或崩溃）。
          1) 核对: systemctl status kube-controller-manager; /etc/kubernetes/controller-manager.kubeconfig 中 clusters[].name / context.cluster 须为**带引号的字符串**且一致（全数字名未加引号会导致进程解析 kubeconfig 失败并退出）。
          2) 请使用**已包含当前 ansible-agent** 的离线包，或在节点上重跑会重写 kubeconfig 的 play；勿仅用旧 zip 内嵌的旧 role。
          3) 过滤出的错误行（若有）:
          {{ cm_err_grep.stdout | default('(无匹配行; 请看第 4 节)') }}
          4) journal 末 80 行:
          {{ cm_journal_tail.stdout | default('(无)') }}

