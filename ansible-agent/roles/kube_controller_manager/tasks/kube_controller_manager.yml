- name: Ensure PKI directory exists
  file:
    path: "{{ k8s_cert_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

# --------------------------------------------------
# 1. 生成私钥
# --------------------------------------------------
- name: Generate controller-manager private key
  community.crypto.openssl_privatekey:
    path: "{{ k8s_cert_dir }}/kube_controller_manager.key"
    size: 2048
    type: RSA
    mode: '0600'
  delegate_to: localhost
  run_once: true

# --------------------------------------------------
# 2. 生成 CSR（纯 client 证书，无 SAN）
# --------------------------------------------------
- name: Generate controller-manager CSR
  community.crypto.openssl_csr:
    path: "{{ k8s_cert_dir }}/kube_controller_manager.csr"
    privatekey_path: "{{ k8s_cert_dir }}/kube_controller_manager.key"
    common_name: system:kube-controller-manager
    organization_name:
      - system:kube-controller-manager
    basic_constraints:
      - CA:FALSE
    key_usage:
      - digitalSignature
      - keyEncipherment
    extended_key_usage:
      - clientAuth
  delegate_to: localhost
  run_once: true

# --------------------------------------------------
# 3. 使用 Kubernetes CA 签发证书
# --------------------------------------------------
- name: Sign controller-manager certificate with Kubernetes CA
  community.crypto.x509_certificate:
    path: "{{ k8s_cert_dir }}/kube_controller_manager.crt"
    csr_path: "{{ k8s_cert_dir }}/kube_controller_manager.csr"
    provider: ownca
    ownca_path: "{{ k8s_cert_dir }}/k8s_ca.crt"
    ownca_privatekey_path: "{{ k8s_cert_dir }}/k8s_ca.key"
    ownca_not_after: "{{ cert_validity }}"
  delegate_to: localhost
  run_once: true


