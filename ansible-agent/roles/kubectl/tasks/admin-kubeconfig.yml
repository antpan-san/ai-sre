- name: Ensure /etc/kubernetes exists
  file:
    path: "{{ k8s_base_dir }}"
    state: directory
    mode: '0755'

- name: Read cluster CA certificate
  slurp:
    src: "{{ k8s_cert_dir}}/k8s_ca.crt"
  register: ca_cert_raw

- name: Read admin client certificate
  slurp:
    src: "{{ k8s_cert_dir }}/apiserver_kubelet_client.crt"
  register: admin_cert_raw

- name: Read admin client key
  slurp:
    src: "{{ k8s_cert_dir }}/apiserver_kubelet_client.key"
  register: admin_key_raw

- name: Generate admin kubeconfig
  copy:
    dest: "{{ k8s_base_dir }}/admin.conf"
    mode: '0600'
    content: |
      apiVersion: v1
      kind: Config
      clusters:
      - cluster:
          certificate-authority-data: {{ ca_cert_raw.content }}
          server: {{ kube_apiserver_endpoint }}
        name: kubernetes
      contexts:
      - context:
          cluster: kubernetes
          user: kubernetes-admin
        name: kubernetes-admin@kubernetes
      current-context: kubernetes-admin@kubernetes
      users:
      - name: kubernetes-admin
        user:
          client-certificate-data: {{ admin_cert_raw.content }}
          client-key-data: {{ admin_key_raw.content }}

- name: Ensure .kube directory exists for root
  file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Install admin kubeconfig for root
  copy:
    src: "{{ k8s_base_dir }}/admin.conf"
    dest: /root/.kube/config
    owner: root
    group: root
    mode: "0600"
    remote_src: yes

- name: Read admin kubeconfig from first control plane for executor host
  slurp:
    src: "{{ k8s_base_dir }}/admin.conf"
  register: admin_kubeconfig_for_executor
  run_once: true

- name: Ensure executor host .kube directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.kube"
    state: directory
    mode: "0700"
  delegate_to: localhost
  run_once: true

- name: Install admin kubeconfig on executor host
  copy:
    dest: "{{ lookup('env', 'HOME') }}/.kube/config"
    content: "{{ admin_kubeconfig_for_executor.content | b64decode }}"
    mode: "0600"
  delegate_to: localhost
  run_once: true

- name: Configure global kubectl environment on executor host
  copy:
    dest: /etc/profile.d/opsfleet-kubectl.sh
    mode: "0644"
    content: |
      # Generated by OpsFleet kubectl role.
      # deploy 机上通常不存在 /etc/kubernetes/admin.conf（该路径在 master 节点）；
      # 标准做法是使用 install 已为执行用户下发的 $HOME/.kube/config。
      if [ -z "${KUBECONFIG:-}" ] && [ -r "$HOME/.kube/config" ]; then
        export KUBECONFIG="$HOME/.kube/config"
      fi
  delegate_to: localhost
  become: true
  run_once: true

