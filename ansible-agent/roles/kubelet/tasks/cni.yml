---
- name: Ensure local cache dir exists on Ansible controller (CNI tarball)
  ansible.builtin.file:
    path: "{{ local_cache_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  run_once: true

- name: Download CNI plugins bundle to controller cache
  ansible.builtin.get_url:
    url: "{{ cni_plugins_download_url }}"
    dest: "{{ cni_plugins_local_tar }}"
    mode: "0644"
    timeout: 1200
  delegate_to: localhost
  run_once: true

- name: Ensure CNI bin directory on node
  ansible.builtin.file:
    path: /opt/cni/bin
    state: directory
    mode: "0755"

- name: Install CNI plugins into /opt/cni/bin
  ansible.builtin.unarchive:
    src: "{{ cni_plugins_local_tar }}"
    dest: /opt/cni/bin
    remote_src: false
    creates: /opt/cni/bin/bridge
