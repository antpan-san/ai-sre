---
- name: Ensure kubernetes directories on node
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ k8s_base_dir }}"
    - "{{ k8s_cert_dir }}"
    - "{{ k8s_base_dir }}/kubelet"
    - /etc/kubernetes/manifests
    - /var/lib/kubelet

- name: Copy cluster CA to node
  ansible.builtin.copy:
    src: "{{ k8s_cert_dir }}/k8s_ca.crt"
    dest: "{{ k8s_cert_dir }}/k8s_ca.crt"
    mode: "0644"
    owner: root
    group: root

- name: Copy kubelet client certificate material to node
  ansible.builtin.copy:
    src: "{{ k8s_cert_dir }}/kubelet-{{ inventory_hostname }}-client.{{ item.ext }}"
    dest: "{{ k8s_cert_dir }}/kubelet-client.{{ item.ext }}"
    mode: "{{ item.mode }}"
    owner: root
    group: root
  loop:
    - { ext: crt, mode: "0644" }
    - { ext: key, mode: "0600" }
  notify: Restart kubelet

- name: Copy kubelet server certificate material to node
  ansible.builtin.copy:
    src: "{{ k8s_cert_dir }}/kubelet-{{ inventory_hostname }}-server.{{ item.ext }}"
    dest: "{{ k8s_cert_dir }}/kubelet-server.{{ item.ext }}"
    mode: "{{ item.mode }}"
    owner: root
    group: root
  loop:
    - { ext: crt, mode: "0644" }
    - { ext: key, mode: "0600" }
  notify: Restart kubelet

- name: Install kubelet binary
  ansible.builtin.copy:
    src: "{{ kubelet_bin_src }}"
    dest: /usr/local/bin/kubelet
    mode: "0755"
    owner: root
    group: root

- name: Render kubelet kubeconfig
  ansible.builtin.template:
    src: kubelet.conf.j2
    dest: "{{ k8s_base_dir }}/kubelet.conf"
    mode: "0600"
    owner: root
    group: root

# systemd-resolved (Ubuntu 24.04+/25.10 默认) 下，/etc/resolv.conf 指向 127.0.0.53；
# 若不覆盖 resolvConf，kubelet 会把该文件注入业务 Pod，CoreDNS 的 forward . /etc/resolv.conf
# 将转发到 127.0.0.53，而容器内 127.0.0.53 就是 CoreDNS 自己，从而触发
# "[FATAL] plugin/loop: Loop (127.0.0.1:xxxx -> :53)" 并 CrashLoopBackOff。
# 检测节点上是否存在真实上游 resolv.conf，有则指向它。
- name: Detect systemd-resolved upstream resolv.conf on node
  ansible.builtin.stat:
    path: /run/systemd/resolve/resolv.conf
  register: systemd_resolved_resolv

- name: Render kubelet configuration
  ansible.builtin.template:
    src: kubelet-config.yaml.j2
    dest: "{{ k8s_base_dir }}/kubelet/config.yaml"
    mode: "0644"
    owner: root
    group: root
  vars:
    kubelet_resolv_conf: "{{ '/run/systemd/resolve/resolv.conf' if systemd_resolved_resolv.stat.exists else '/etc/resolv.conf' }}"
  notify: Restart kubelet
