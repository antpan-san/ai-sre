- name: Ensure Directory is exists
  ansible.builtin.file:
    path: "{{ local_cache_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: true

- name: Stat kubernetes server tarball (persistent cache; get_url 校验一致则跳过下载)
  ansible.builtin.stat:
    path: "{{ k8s_package_tar }}"
    checksum_algorithm: sha512
  register: k8s_server_tar_stat
  delegate_to: localhost
  run_once: true

- name: Report artifact cache status
  ansible.builtin.debug:
    msg: >-
      local_cache_dir={{ local_cache_dir }} | path={{ k8s_package_tar }} |
      exists={{ k8s_server_tar_stat.stat.exists | default(false) }} (checksum 由 get_url 与远程 sha512 比对，一致则跳过下载)
  delegate_to: localhost
  run_once: true

- name: Show kubernetes server tarball URL
  ansible.builtin.debug:
    msg: "Downloading kubernetes server tarball: {{ k8s_server_tarball_url }} -> {{ k8s_package_tar }} (cache skip if sha512 matches)"
  delegate_to: localhost
  run_once: true

# 离线包：仅用十六进制 k8s_checksum。「阿里云/dl.k8s」合并块会写入
# k8s_server_tarball_checksum: sha512:https://.../.tar.gz.sha512 — 必须由下载脚本拉取远端摘要，
# 不可再使用 zip 自带的 k8s_checksum（易与控制台选的版本/arch 错位）。
- name: Choose kubernetes server tarball checksum/ref for download helper
  ansible.builtin.set_fact:
    k8s_dl_checksum_ref: >-
      {{
        k8s_server_tarball_checksum | regex_replace('^sha512:', '')
        if (
             (k8s_server_tarball_checksum | default('') ).startswith('sha512:http')
          or (k8s_server_tarball_checksum | default('') ).startswith('sha512:https')
           )
          else k8s_checksum }}
  delegate_to: localhost
  run_once: true

- name: Download kubernetes server tarball via helper
  ansible.builtin.command:
    cmd: "bash {{ opsfleet_download_helper }} {{ k8s_server_tarball_url }} {{ k8s_package_tar }} {{ k8s_dl_checksum_ref }}"
  environment: "{{ opsfleet_download_env | default({'OPSFLEET_NO_PROGRESS': '1'}, true) }}"
  register: k8s_dl
  changed_when: "'下载完成' in (k8s_dl.stderr | default(''))"
  failed_when: k8s_dl.rc not in [0]
  delegate_to: localhost
  run_once: true

- name: Show kubernetes tarball download summary
  ansible.builtin.debug:
    msg: "{{ k8s_dl.stderr_lines | default([]) }}"
  delegate_to: localhost
  run_once: true
  when: k8s_dl.stderr_lines is defined and (k8s_dl.stderr_lines | length) > 0


- name: Extract tarball on control node
  ansible.builtin.unarchive:
    src: "{{ k8s_package_tar }}"
    dest: "{{ local_cache_dir }}"
    remote_src: yes
    creates: "{{ k8s_extract_dir }}/server/bin/kube-apiserver"
  delegate_to: localhost
  run_once: true

- name: Create kubernetes directory on nodes
  ansible.builtin.file:
    path: "{{ remote_dest }}/kubernetes/bin"
    state: directory
    mode: '0755'

