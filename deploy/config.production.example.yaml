# 复制为 ft-backend/conf/config.yaml（勿提交真实密码；仅服务器本地保留）
server:
  host: 0.0.0.0
  port: "8080"
  read_timeout: 30
  write_timeout: 30
database:
  host: 127.0.0.1
  port: "5432"
  user: postgres
  password: "change-me"
  dbname: opsfleetpilot
  sslmode: disable
  timezone: Asia/Shanghai
jwt:
  secret_key: change-me-in-production
  access_token_exp: 15
  refresh_token_exp: 1440
file:
  upload_dir: uploads
  max_file_size: 1073741824
  chunk_size: 1048576
  allowed_formats:
    - jpg
    - png
    - pdf
    - txt
    - zip
    - rar
redis:
  host: 127.0.0.1
  port: "6379"
  # 无密码的本地 Redis 请用 ""；与 redis.conf requirepass 一致
  password: ""
  db: 0
client:
  encrypt_key: change-me-in-production
log:
  level: info
# 服务端 LLM：api_key 仅通过 OPSFLEET_AI_API_KEY 注入，勿写入本文件并提交。
ai:
  api_key: ""
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat

# curl 安装 ai-sre、技能数据目录（路径可被 OPSFLEET_AISRE_* / OPSFLEET_AI_SKILL_DATA_DIR 覆盖）
opsfleet:
  ai_sre_binary_path: ""
  # ai_sre_binary_path_amd64: ""
  # ai_sre_binary_path_arm64: ""
  ai_skill_data_dir: /var/lib/opsfleet/ai-skills

k8s:
  mirror_base_url: http://127.0.0.1
  mirror_manifest_url: ""
  relay_base_url: ""
  ansible_dir: ""

# 技能自动 refine（生产建议 enabled: false，或仅实验室开启）
skills:
  auto_refine:
    enabled: false
    min_samples: 8
    cooldown: 12h
    topics:
      - go_runtime
      - k8s
    max_per_day: 3

# 自动迭代（钉钉 webhook/token 仅 OPSFLEET_AUTO_ITERATION_DINGTALK_WEBHOOK）
auto_iteration:
  enabled: true
  max_concurrent: 2
  high_risk_requires_approval: true
  dingtalk_keyword: "操"
