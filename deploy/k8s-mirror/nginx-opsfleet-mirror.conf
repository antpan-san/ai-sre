# 示例：放入 /etc/nginx/sites-available/opsfleet-k8s-mirror
# 将 MIRROR_ROOT 与 download_domain 对齐（默认 /var/lib/opsfleet-k8s-mirror）

server {
    listen 80;
    # 含 127.0.0.1/localhost，便于本机 curl 自检与 verify 脚本（与 download_domain 并存）
    server_name 192.168.56.11 127.0.0.1 localhost;

    root /var/lib/opsfleet-k8s-mirror;
    autoindex off;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }
}
