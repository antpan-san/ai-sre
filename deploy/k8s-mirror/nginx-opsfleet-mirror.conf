# 示例：放入 /etc/nginx/sites-available/opsfleet-k8s-mirror
# 将 MIRROR_ROOT 与 download_domain 对齐（默认 /var/lib/opsfleet-k8s-mirror）
# 需先安装并运行 opsfleet-k8s-mirror-serve（本机 127.0.0.1:8090），见 opsfleet-k8s-mirror-serve.service
# 行为：命中磁盘则直出；未命中则反代到 mirror-serve，从公网拉入 MIRROR_ROOT 后返回并永久缓存

server {
    listen 80;
    # 含 127.0.0.1/localhost，便于本机 curl 自检与 verify 脚本（与 download_domain 并存）
    server_name 192.168.56.11 127.0.0.1 localhost;

    root /var/lib/opsfleet-k8s-mirror;
    autoindex off;

    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8090/health;
        proxy_connect_timeout 5s;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ @k8s_mirror_ondemand;
    }

    location @k8s_mirror_ondemand {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
