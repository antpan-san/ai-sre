apiVersion: v1
kind: Namespace
metadata:
  name: memleak-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memleak-demo
  namespace: memleak-demo
  labels:
    app: memleak-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memleak-demo
  template:
    metadata:
      labels:
        app: memleak-demo
    spec:
      # 镜像仅在 master 预加载；固定调度避免 worker 拉不到本地镜像。
      nodeSelector:
        kubernetes.io/hostname: k8s-master-0
      containers:
        - name: memleak-demo
          image: memleak-demo:lab
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LEAK_CHUNK_MB
              value: "10"
            - name: LEAK_INTERVAL_SEC
              value: "2"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: memleak-demo
  namespace: memleak-demo
  labels:
    app: memleak-demo
spec:
  type: ClusterIP
  selector:
    app: memleak-demo
  ports:
    - name: http
      port: 8080
      targetPort: http
