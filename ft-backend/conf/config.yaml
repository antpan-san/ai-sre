server:
    host: 0.0.0.0
    port: "8080"
    read_timeout: 30
    write_timeout: 30
database:
    host: 127.0.0.1
    port: "5432"
    user: postgres
    password: "postgres"
    dbname: opsfleetpilot
    sslmode: disable
    timezone: Asia/Shanghai
jwt:
    secret_key: 123456
    access_token_exp: 1440
    refresh_token_exp: 10080
file:
    upload_dir: uploads
    max_file_size: 1073741824
    chunk_size: 1048576
    allowed_formats:
        - jpg
        - png
        - pdf
        - txt
        - zip
        - rar
redis:
    host: 127.0.0.1
    port: "6379"
    password: "123456"
    db: 0
security:
    cors_allowed_origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
        # 控制台常用入口（须与浏览器地址栏完全一致，含端口）
        - http://127.0.0.1:9080
        - http://192.168.56.11:9080
        - http://opsfleetpilot.com
        - https://opsfleetpilot.com
        - http://opsfleetpilot.com:9080
        - https://opsfleetpilot.com:9080
    # 为 true 时关闭 POST /api/auth/register（仅管理员后台建号）
    disable_public_registration: false
    # 为 true 时关闭登录算术验证码（仍保留限流；纯内网可开）
    disable_login_captcha: false

client:
    encrypt_key: 123456

# 服务端 LLM（密钥优先用环境变量 OPSFLEET_AI_API_KEY，勿将真实 key 提交仓库）
ai:
    api_key: ""
    base_url: https://api.deepseek.com/v1
    model: deepseek-chat

# OpsFleet 扩展：ai-sre 分发、技能样本目录（可被 OPSFLEET_* 环境变量覆盖）
opsfleet:
    ai_sre_binary_path: ""
    ai_skill_data_dir: /var/lib/opsfleet/ai-skills

# K8s 制品与离线包（实验室默认与 deploy-opsfleet 写入的 mirror 一致）
k8s:
    mirror_base_url: http://192.168.56.11
    mirror_manifest_url: ""
    relay_base_url: ""
    ansible_dir: ""

# 服务端技能自迭代（实验室默认开启；生产请改 enabled: false 或仅用环境变量）
# 自动迭代（控制台仅 super_admin；Worker 用 OPSFLEET_CODE_AGENT_TOKEN）
auto_iteration:
    enabled: false
    max_concurrent: 2
    high_risk_requires_approval: true
    dingtalk_webhook: ""
    github_repo: ""
    code_agent_token: ""

skills:
    auto_refine:
        enabled: true
        min_samples: 8
        cooldown: 12h
        topics:
            - go_runtime
            - k8s
            - redis
            - kafka
            - linux
            - nginx
            - mysql
            - postgresql
            - elasticsearch
            - domain
        max_per_day: 3
    feedback:
        helpful_threshold: 5
        unhelpful_threshold: 3
        window_days: 7

log:
    level: debug

billing:
    stripe_secret_key: ""
    stripe_webhook_secret: ""
    # 未配置 packages 时，保留 stripe_price_id_pro 并映射为 pack.backup_performance（兼容旧部署）
    stripe_price_id_pro: ""
    public_app_base_url: "http://127.0.0.1:9080"
    # 多功能包示例（每项对应 Stripe Dashboard 中的一个 Price ID；id 使用内置 pack_key/skillpack_key）：
    # packages:
    #   - id: pack.k8s_delivery
    #     display_name: "K8s 交付包"
    #     stripe_price_id: price_xxx
    #     feature_keys: [feature.k8s_delivery, feature.k8s_ops]
    #   - id: pack.node_ops
    #     display_name: "节点运维包"
    #     stripe_price_id: price_yyy
    #     feature_keys: [feature.node_ops, feature.service_ops, feature.infra_ops]
    #   - id: pack.backup_performance
    #     display_name: "备份与性能包"
    #     stripe_price_id: price_zzz
    #     feature_keys: [feature.backup_performance, feature.advanced]
    #   - id: skillpack.kafka
    #     display_name: "Kafka AI 技能包"
    #     stripe_price_id: price_skill_kafka
    #     feature_keys: [feature.ai_diagnosis]
