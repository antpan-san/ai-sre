server:
    host: 0.0.0.0
    port: "8080"
    read_timeout: 30
    write_timeout: 30
database:
    host: 127.0.0.1
    port: "5432"
    user: postgres
    password: "postgres"
    dbname: opsfleetpilot
    sslmode: disable
    timezone: Asia/Shanghai
jwt:
    secret_key: 123456
    access_token_exp: 15
    refresh_token_exp: 1440
file:
    upload_dir: uploads
    max_file_size: 1073741824
    chunk_size: 1048576
    allowed_formats:
        - jpg
        - png
        - pdf
        - txt
        - zip
        - rar
redis:
    host: 127.0.0.1
    port: "6379"
    password: "123456"
    db: 0
security:
    cors_allowed_origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
        # 控制台常用入口（须与浏览器地址栏完全一致，含端口）
        - http://127.0.0.1:9080
        - http://192.168.56.11:9080
        - http://opsfleetpilot.com
        - https://opsfleetpilot.com
        - http://opsfleetpilot.com:9080
        - https://opsfleetpilot.com:9080
    # 为 true 时关闭 POST /api/auth/register（仅管理员后台建号）
    disable_public_registration: false
    # 为 true 时关闭登录算术验证码（仍保留限流；纯内网可开）
    disable_login_captcha: false

client:
    encrypt_key: 123456

log:
    level: debug

billing:
    stripe_secret_key: ""
    stripe_webhook_secret: ""
    # 未配置 packages 时，保留 stripe_price_id_pro 仅此价映射为「仅 feature.advanced」兼容旧部署
    stripe_price_id_pro: ""
    public_app_base_url: "http://127.0.0.1:9080"
    # 多功能包示例（每项对应 Stripe Dashboard 中的一个 Price ID）：
    # packages:
    #   - id: k8s
    #     display_name: "K8s 交付包"
    #     stripe_price_id: price_xxx
    #     feature_keys: [feature.k8s_ops]
    #   - id: platform
    #     display_name: "交付 + 运维基础"
    #     stripe_price_id: price_yyy
    #     feature_keys: [feature.k8s_ops, feature.service_ops, feature.infra_ops]
    #   - id: full
    #     display_name: "含高级功能全家桶"
    #     stripe_price_id: price_zzz
    #     feature_keys: [feature.k8s_ops, feature.service_ops, feature.infra_ops, feature.advanced]
