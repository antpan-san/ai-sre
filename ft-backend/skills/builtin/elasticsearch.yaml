name: elasticsearch_diagnose_v1
display_name: "Elasticsearch 健康与单/多节点快诊"
topics:
  - elasticsearch
  - es
match_keywords:
  - elasticsearch
  - cluster_health
  - shards
  - unassigned
  - yellow
  - red
  - heap
  - jvm
  - heap_used_percent
input:
  - base_url
  - es_cluster_health
  - es_cat_nodes
  - es_cat_indices
analysis_steps:
  - 解析 _cluster/health（status、unassigned/initializing/relocating shards、number_of_nodes）
  - 评估单节点 vs 多节点拓扑：副本是否合法、shard 分布是否均衡
  - 关注 JVM heap / GC、磁盘水位（high_watermark）、节点掉线
  - 关键索引：是否存在 unassigned 主分片或副本，触发 allocation 解释（必要时建议拉 `_cluster/allocation/explain`）
  - 兼容性：版本与 _cluster/state 字段
output_format:
  - 根因与触发条件
  - 关键证据（health JSON 摘录、cat nodes / cat indices 关键行）
  - 缓解与根治（分配重试、节点恢复、副本配置、磁盘扩容）
extra_guidance: |
  - 优先使用 `ai-sre elasticsearch diagnose <url>` 的输出。
  - 单节点 yellow 多为副本无法分配；不要把它误判为故障，需结合期望拓扑评估。
