name: opsfleet_error_codes_v1
display_name: OpsFleet 部署错误码根因库
topics: [errorcode, deploy, install]
match_keywords:
  - OPSFLEET_
  - OPSFLEET_K8S_E_EXECUTOR
  - "[ERROR-CODE]"
  - "FAILED at"
  - "Timeout when waiting for"
  - "wait_apiserver"
input:
  - 错误码（OPSFLEET_*）或 install.sh / ansible 失败原文片段
  - 可选：客户机执行过的命令上下文 / arch / k8s 版本
analysis_steps:
  - 解析错误码 → 在 error_codes 中匹配根因 (root_cause) 字段，回答必须以 "根因：" 起头
  - 若客户给了 detail 文本，挑出关键证据片段（image 名、HTTP 码、syscall 错误）
  - 写出 1 条 "立即可执行的一次性修复命令"（recovery_one_liner）
  - 写出 1 条 "下一版需要平台侧做的改造" (platform_followup)，引用 ansible role / yaml 路径
  - 拒绝给"排查清单"；输出长度务必短（≤6 行）
output_format:
  - "根因（含证据片段）"
  - "立即恢复（一行 shell）"
  - "平台改进（含文件路径）"
  - "错误码原文"
extra_guidance: |
  - "根因" 不允许出现 "可能 / 大概率 / 排查清单" 等模糊措辞
  - "立即恢复" 必须是 root 节点上 1 行可粘贴执行
  - "平台改进" 必须指向 ansible-agent/ 或 deploy/k8s-mirror/ 下具体文件
prompt_template: ""
# OpsFleet 错误码 → 根因 知识库。每条 entry 都来自一次真实现场，被 ai-sre 与 OpsFleet 控制台共享。
error_codes:
  - code: OPSFLEET_K8S_E_PAUSE_MISSING
    summary: containerd 节点缺 pause:3.10 镜像，静态 Pod sandbox 创建失败
    root_cause: |
      静态 Pod 模式下 kubelet 让 containerd 拉 sandbox 镜像 (registry.k8s.io/pause:3.10)，
      但 registry.k8s.io 重定向到 europe-west*-docker.pkg.dev，本机内网不可达，
      kube-apiserver / scheduler / controller-manager 三个静态 Pod 持续 CreatePodSandbox 失败，
      6443 永不监听，wait_apiserver 必然超时。
    typical_evidence:
      - "failed to pull image \"registry.k8s.io/pause:3.10\""
      - "dial tcp 74.125.135.82:443: i/o timeout"
      - "Head https://europe-west4-docker.pkg.dev/v2/.../pause/manifests/3.10"
    recovery_one_liner: |
      curl -fsSL "${MIRROR_BASE:-http://192.168.56.11}/registry-images/registry.k8s.io/pause/3.10/pause-3.10-linux-$(arch|sed 's/aarch64/arm64/;s/x86_64/amd64/').tar" -o /tmp/pause.tar && ctr -n k8s.io images import /tmp/pause.tar && systemctl restart kubelet
    platform_followup: |
      已新增 ansible-agent/roles/pause_preload，containerd.yml 会在 install 时
      从 mirror 自动 import pause 镜像；同步脚本 deploy/k8s-mirror/k8s-mirror-sync.sh
      也会自动生成 registry-images/registry.k8s.io/pause/3.10/*.tar。
    related_codes: [OPSFLEET_K8S_E_APISERVER_TIMEOUT]

  - code: OPSFLEET_K8S_E_CALICO_PREFETCH_FAILED
    summary: 各节点 ctr pull Calico（quay.io/calico/*）在重试窗口内仍失败
    root_cause: |
      install 在 apply Calico manifest 之前会在 k8s_cluster 全节点执行 calico_image_prefetch，
      若 quay.io 不可达、DNS 异常或企业出口重置连接，ctr pull 耗尽 retries 后失败，
      安装脚本中止；若跳过预拉（旧包）则 calico-node init 会 ImagePullBackOff，
      主机 /var/lib/calico/nodename 不出现，其它 Pod CreatePodSandbox 报 calico CNI 读 nodename 失败。
    typical_evidence:
      - "[ERROR-CODE] OPSFLEET_K8S_E_CALICO_PREFETCH_FAILED"
      - "Failed to pull image \"quay.io/calico/cni"
      - "stat /var/lib/calico/nodename: no such file or directory"
    recovery_one_liner: |
      在故障节点执行: ctr -n k8s.io images pull quay.io/calico/cni:v3.31.5 && ctr -n k8s.io images pull quay.io/calico/node:v3.31.5 && ctr -n k8s.io images pull quay.io/calico/kube-controllers:v3.31.5 && systemctl restart kubelet
    platform_followup: |
      ansible-agent/roles/calico_image_prefetch 与 playbooks/k8s_addons.yml 首段；
      纯离线环境需在 deploy/k8s-mirror 增加 Calico oci tar 与 ctr import（比照 pause_preload）。
    related_codes: [OPSFLEET_DL_E_NETWORK]

  - code: OPSFLEET_K8S_E_APISERVER_TIMEOUT
    summary: wait_apiserver.yml 在 180s 内未检测到 127.0.0.1:6443
    root_cause: |
      apiserver 静态 Pod 没起来。绝大多数情况下根本原因不在 apiserver 本身：
      要么 sandbox(pause) 镜像缺失（→ OPSFLEET_K8S_E_PAUSE_MISSING），
      要么 apiserver 容器镜像不在内网（→ OPSFLEET_K8S_E_APISERVER_IMAGE_PULL），
      要么 apiserver 证书 SAN/CA 与内网 IP 不匹配（→ OPSFLEET_K8S_E_APISERVER_CERT）。
      必须先看 `journalctl -u kubelet` 才能定位是哪一个。
    typical_evidence:
      - "Timeout when waiting for 127.0.0.1:6443"
      - "FAILED at playbooks/wait_apiserver.yml"
    recovery_one_liner: |
      journalctl -u kubelet -n 60 --no-pager | grep -E "pull image|x509|ErrImagePull|CreatePodSandbox" | head -5
    platform_followup: |
      playbooks/wait_apiserver.yml 已加 pre_tasks 预检：
      若 pause 缺失会立即 emit OPSFLEET_K8S_E_PAUSE_MISSING；
      若 wait_for 超时也会 emit OPSFLEET_K8S_E_APISERVER_TIMEOUT 而非裸 timeout。
    related_codes: [OPSFLEET_K8S_E_PAUSE_MISSING, OPSFLEET_K8S_E_APISERVER_IMAGE_PULL, OPSFLEET_K8S_E_APISERVER_CERT]

  - code: OPSFLEET_K8S_E_APISERVER_IMAGE_PULL
    summary: kube-apiserver 静态 Pod 镜像不在内网仓库
    root_cause: |
      static-pod 模式的 kube-apiserver 镜像走 OpsFleet 合并块写入的 kube_apiserver_image。
      若控制台选了"默认 (内网)" 但内网 docker registry 没 push 这一 tag，
      kubelet 拉镜像会 ErrImagePull/ImagePullBackOff，apiserver 永远不起来。
    typical_evidence:
      - "Failed to pull image \"<registry>/kube-apiserver:v"
      - "ErrImagePull"
    recovery_one_liner: |
      crictl --runtime-endpoint unix:///run/containerd/containerd.sock pull <配置里的 kube_apiserver_image> ; systemctl restart kubelet
    platform_followup: |
      控制台「镜像源」切换时 ft-backend/handlers/k8s_ansible.go 已写入 k8s_image_repository；
      未来需在 deploy/k8s-mirror 同步脚本中增加 kube-apiserver/controller-manager/scheduler 镜像 tar。
    related_codes: [OPSFLEET_K8S_E_APISERVER_TIMEOUT, OPSFLEET_K8S_E_PAUSE_MISSING]

  - code: OPSFLEET_K8S_E_APISERVER_CERT
    summary: kube-apiserver 启动但 livez 校验失败（x509）
    root_cause: |
      apiserver 静态 Pod 起来了但 wait_apiserver 第二步 livez 用 client cert 失败，
      通常因为 SAN 中缺 advertise_address 或 service_cluster_ip。
    typical_evidence:
      - "x509: certificate is valid for"
      - "tls: failed to verify certificate"
    recovery_one_liner: |
      openssl x509 -in /etc/kubernetes/pki/apiserver.crt -noout -text | grep -A2 "Subject Alternative Name"
    platform_followup: |
      apiserver 证书在 roles/kube_apiserver/ 的 cert 生成 task；
      group_vars/all.yml 中 ipSANS 已含 advertise_address，但合并块若漏了 service_cluster_ip 仍会失败。
    related_codes: [OPSFLEET_K8S_E_APISERVER_TIMEOUT]

  - code: OPSFLEET_DL_E_NETWORK
    summary: ansible 下载帮助脚本 curl 非 0（网络不通 / DNS 解析失败 / TLS 握手失败）
    root_cause: |
      download-with-progress.sh 内 curl --fail 在 30s 内未完成。
      若是 mirror URL，多半是节点到 192.168.56.11 的网络不通或 nginx 未启动。
    typical_evidence:
      - "[ERROR-CODE] OPSFLEET_DL_E_NETWORK url="
      - "curl: (28) Connection timed out"
    recovery_one_liner: |
      curl -v --max-time 5 "$URL" 2>&1 | head -20
    platform_followup: |
      ansible-agent/scripts/download-with-progress.sh 已 emit [ERROR-CODE] 标签；
      可在 install.sh 中识别该标签并直接跳到 mirror 自检步骤。
    related_codes: [OPSFLEET_DL_E_CHECKSUM]

  - code: OPSFLEET_DL_E_CHECKSUM
    summary: 下载完成但 sha512 或 min_bytes 校验失败
    root_cause: |
      mirror 上的制品文件被替换了/被截断了，或 manifest.json 中的 sha512 与实际 tarball 不一致。
    typical_evidence:
      - "[ERROR-CODE] OPSFLEET_DL_E_CHECKSUM"
      - "sha512 mismatch"
    recovery_one_liner: |
      curl -fsSL "${MIRROR_BASE}/manifest.json" | jq '.files[] | select(.relativePath==\"<rel>\")'
    platform_followup: |
      deploy/k8s-mirror/k8s-mirror-generate-manifest.sh 已生成 sha512，OpsFort 重跑该脚本即可对齐。
    related_codes: [OPSFLEET_DL_E_NETWORK]

  - code: OPSFLEET_K8S_E_EXECUTOR_KUBECTL_BIN_MISSING
    summary: 部署机（跑 install.sh / ansible-playbook 的机器）缓存里缺 kubectl 二进制
    root_cause: |
      kubernetes-server tarball 未在控制机 /var/cache/opsfleet-k8s 下解压出 server/bin/kubectl，
      或跳过了 resources / kubectl 相关步骤就执行了仅含 kubeconfig 的任务。
      kubectl 角色最后一步需要把与集群同版本的客户端装到部署机 /usr/local/bin/kubectl。
    typical_evidence:
      - "[ERROR-CODE] OPSFLEET_K8S_E_EXECUTOR_KUBECTL_BIN_MISSING"
      - "部署机缓存中缺少 .../kubernetes/server/bin/kubectl"
    recovery_one_liner: |
      在解压后的离线包根目录执行: sudo ansible-playbook -i inventory ansible-agent/playbooks/resources.yml ansible-agent/playbooks/kubectl.yml
    platform_followup: |
      ansible-agent/roles/kubectl/tasks/control_host_cli.yml 在 kubectl playbook 成功路径下
      自动 install 同版本 kubectl；若仍失败请先跑 playbooks/resources.yml 解压 server tarball。
    related_codes: [OPSFLEET_DL_E_CHECKSUM, OPSFLEET_DL_E_NETWORK]
