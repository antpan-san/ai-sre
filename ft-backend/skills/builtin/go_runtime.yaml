name: go_runtime_diagnose_v1
display_name: "Go 运行时 / K8s 工作负载诊断"
topics:
  - go_runtime
  - go-runtime
match_keywords:
  - go_runtime
  - proc
  - rss
  - cgroup
  - memory
  - deployment
  - pod
  - container
  - imagepull
  - collector
input:
  - go_runtime_watch_json
  - diagnosis_target
  - resource_kind
  - resource_name
  - work_pod
  - diagnosis_source
  - kubectl_focus_describe
  - kubectl_focus_events
  - kubectl_focus_logs_current
  - kubectl_deployment_describe
  - kubectl_ingress_describe
analysis_steps:
  - 结合诊断目标（Pod/Deployment/Ingress 等）与当次 proc 采样趋势（RSS、匿名内存、FD、线程、cgroup throttling）
  - 若 sample_count=0，优先从 kubectl 证据与 trend_findings 判断采集器失败、镜像拉取、探针/调度问题，再推断业务进程是否异常
  - 区分「平台/集群基础设施问题」与「应用进程内存泄漏、死循环、OOM」两类根因，避免把 busybox 拉取失败与业务堆增长混为一谈
  - 对照 events 与 describe 中的 Waiting/BackOff/OOMKilled/重启次数，锁定最早触发点
  - 输出必须可复核：根因一句话 + 证据摘录（来自上报字段或日志/events 片段），不给客户罗列 kubectl 命令清单
output_format:
  - 根因：（一句话）
  - 证据：（2–5 条摘录或指标摘要，注明来源如 proc 趋势 / events / 采集器状态）
extra_guidance: |
  - 上下文中的 go_runtime_watch_json 为结构化摘要；kubectl_* 键为自动采集的只读证据。
  - 若 diagnosis_source=local，说明规则引擎已给出结论，AI 应核对并可在必要时精炼表述，勿推翻无依据。
  - 若 diagnosis_source=ai，应严格基于上下文，禁止编造未出现的 Pod 名、镜像名或错误码。
  - 禁止输出「建议用户执行 kubectl …」类排查清单；采集已由 ai-sre 完成。
