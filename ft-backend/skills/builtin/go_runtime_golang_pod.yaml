name: go_runtime_golang_pod_v1
display_name: "Go 应用 Pod 常见异常（实验室矩阵验证）"
topics:
  - go_runtime
  - golang
match_keywords:
  - go_runtime
  - golang
  - memleak
  - OOMKilled
  - CrashLoopBackOff
  - ImagePullBackOff
input:
  - go_runtime_watch_json
  - kubectl_focus_describe
  - kubectl_focus_events
  - kubectl_focus_logs_current
  - kubectl_focus_logs_previous
analysis_steps:
  - 优先解析目标 Pod 的 Waiting/Terminated reason，再读 events 时间线
  - Go OOM：LastState OOMKilled、exit 137、日志 alloc/sys 与 memory limit
  - Go CrashLoop：logs --previous 中 panic/fatal/exit code
  - 镜像与调度：ImagePullBackOff、ErrImagePull、FailedScheduling、Insufficient cpu/memory
  - 探针：liveness/readiness 端口与容器监听端口不一致
  - Init 容器失败阻塞主容器启动
output_format:
  - 根因：（一句话）
  - 证据：（摘录）
extra_guidance: |
  与客户端技能 go_runtime_golang_pod 对齐；实验室 memleak-demo 镜像用于 OOM/探针类用例。
  节点未导入镜像时会出现 ErrImagePull——根因应写「节点缺少本地镜像」而非仅「采集器失败」。
