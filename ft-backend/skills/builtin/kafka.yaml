name: kafka_diagnose_v1
display_name: "Kafka 集群与消费组快诊"
topics:
  - kafka
match_keywords:
  - kafka
  - bootstrap
  - lag
  - isr
  - controller
  - leader
  - partition
  - broker
  - topic
  - rebalance
  - sasl
input:
  - bootstrap
  - topic
  - lag
  - kafka_metadata
  - kafka_consumer_groups
  - kafka_isr
  - kafka_log
analysis_steps:
  - 区分「集群级」（broker 数 / controller / ISR / leader 不均衡）与「消费侧」（lag、rebalance、停顿）的问题类别
  - 检查 broker 在线数、controller 是否切换频繁、是否存在 under-replicated 分区与 leader skew
  - 对照 consumer group lag 与生产 / 消费速率，判断是否需要扩分区或扩消费实例
  - 关注 SASL/TLS 鉴权、ACL、ZK/KRaft 元数据健康（含 metadata.version 不匹配）
  - 评估磁盘 / 网络瓶颈（page cache、follower fetch、replica lag）与日志保留策略
output_format:
  - 结论与最可能根因
  - 关键指标证据（数值、阈值、对比）
  - 应优先修复的组件 / 是否需要 reassign / 是否需要扩容
  - 进一步排查（必要时建议运行 `ai-sre kafka diagnose ... --json` 并将输出 -d kafka_metadata=...）
extra_guidance: |
  - 不要凭空给出未在采集中出现的 broker 列表或 topic 名。
  - 优先复用 `ai-sre kafka diagnose --json` 输出做证据。
