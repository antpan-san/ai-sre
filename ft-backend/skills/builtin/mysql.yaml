name: mysql_diagnose_v1
display_name: "MySQL 在线运行问题快诊"
topics:
  - mysql
match_keywords:
  - mysql
  - innodb
  - slow
  - lock
  - replica
  - read_only
  - threads
  - max_connections
input:
  - dsn
  - mysql_status
  - mysql_variables
  - mysql_processlist
  - mysql_slow_top
analysis_steps:
  - 判断连接侧问题（Threads_connected / max_connections / aborted_connects）
  - 慢查询 / 锁等待（Slow_queries、innodb_row_lock_*、Threads_running）
  - 复制 / 只读状态（Slave_IO/SQL_Running、read_only、Seconds_Behind_Master）
  - 资源 / 配置（innodb_buffer_pool 使用率、tmp / sort、open_files）
  - 必要时关注磁盘 IO 与表碎片
output_format:
  - 根因与最可能触发因素
  - 关键指标证据
  - 缓解与根治建议（含参数调优 / 索引 / 拓扑）
extra_guidance: |
  - 优先使用 `ai-sre mysql diagnose <dsn>` 的输出做证据；避免凭直觉给参数值。
