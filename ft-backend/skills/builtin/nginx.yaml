name: nginx_diagnose_v1
display_name: "Nginx 访问日志 / 反代快诊"
topics:
  - nginx
match_keywords:
  - nginx
  - upstream
  - 502
  - 503
  - 504
  - p99
  - keepalive
  - rate_limit
  - access_log
input:
  - status_code
  - upstream
  - latency_p99
  - nginx_log_summary
analysis_steps:
  - 解析访问日志分布（状态码 Top、Top 路径、p95 / p99 延迟、错误集中段）
  - 关联 upstream 健康（连接重置、超时、被动 health check 失败）
  - 评估限流 / 鉴权 / 缓存策略是否过严
  - 关注后端慢响应、Keepalive、worker 数量、worker_connections
output_format:
  - 根因与触发条件
  - 关键统计证据（状态码占比、Top 路径、延迟分布）
  - 缓解与根治（前端限流、超时调整、后端扩容、配置改造）
extra_guidance: |
  - 优先以 `ai-sre nginx diagnose ... --json` 的统计做证据。
  - 不要把单条 access_log 上升为根因；必须聚合后再下结论。
