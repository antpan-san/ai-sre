name: redis_diagnose_v1
display_name: "Redis 单实例 / 集群快诊"
topics:
  - redis
match_keywords:
  - redis
  - latency
  - eviction
  - maxmemory
  - replication
  - cluster
  - aof
  - rdb
  - connected_clients
input:
  - host
  - port
  - latency
  - redis_info
  - redis_slowlog
analysis_steps:
  - 评估连接性（rejected_connections / maxclients / 半连接）
  - 检查内存（used_memory / maxmemory / evicted_keys / mem_fragmentation_ratio）
  - 持久化与复制（rdb_bgsave_in_progress、aof_rewrite_in_progress、master_link_status、repl_backlog）
  - 慢日志 / 命令分布（slowlog / latest_fork_usec / blocked_clients）
  - 若集群（cluster_enabled=1），关注 cluster_slots_assigned、cluster_state、节点心跳
output_format:
  - 根因与触发条件
  - 关键指标证据
  - 缓解与根治建议（含是否升配 / 调整 maxmemory-policy / 拓扑改造）
extra_guidance: |
  - 优先使用 `ai-sre redis diagnose <host:port>` 的 INFO 输出做证据。
  - 严禁臆造延迟数据；若信息不足明确指出需补哪些字段。
