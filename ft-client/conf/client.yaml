# =============================================================================
# OpsFleetPilot Client Agent 配置文件
# =============================================================================

# Server 连接配置
server:
  url: "http://172.27.28.207:8080"         # Server 地址 (支持 http/https)

# Client 身份配置
client:
  id: ""                               # Client ID，留空则自动生成
  version: "1.0.0"                     # 当前版本号
  business_module: "default"           # 业务模块标识
  role: "master"                       # 节点角色: master(主控) 或 worker(受控)

# 集群拓扑配置 (主控-受控纳管必填)
cluster:
  id: "default-cluster"                # 集群唯一标识 (必填，用于建立主控-受控拓扑)
  name: "默认集群"                      # 集群显示名称 (可选，默认等于 id)

# 鉴权配置 (心跳接口安全)
auth:
  token: ""                            # Bearer Token，用于心跳和任务上报的 API 鉴权

# 心跳配置
heartbeat:
  interval: 5                          # 心跳间隔(秒)，默认5秒
  retry_interval: 10                   # 心跳失败后重试间隔(秒)
  max_failures: 3                      # 连续失败N次后告警

# 受控节点管理配置 (仅 master 角色使用)
node_manager:
  enabled: true                        # 是否启用节点管理 (有 managed_nodes 时自动开启)
  probe_interval: 30                   # 节点探测间隔(秒)，默认30秒
  probe_timeout: 15                    # 单次探测超时(秒)；SSH采集含多条命令，建议>=15秒

# 受控节点列表 (仅 master 角色需要配置)
# master 会定期探测这些节点的状态，并在心跳中上报给 server
managed_nodes:
  - ip: "172.16.195.128"
    hostname: "worker-node-1"
    ssh_port: 22
    ssh_user: "root"
    ssh_key: "/root/.ssh/id_rsa"

# 日志配置
log:
  level: "info"                        # 日志级别: debug, info, warn, error
  file: ""                             # 日志文件路径，留空则仅输出控制台
  max_size: 100                        # 单文件最大 MB
  max_backups: 3                       # 保留历史文件数

# TLS 配置 (用于 HTTPS 通信)
tls:
  enabled: false                       # 是否启用 TLS 验证
  ca_cert: ""                          # CA 证书文件路径
  skip_verify: false                   # 是否跳过证书验证(仅开发环境)
