name: elasticsearch_health
display_name: Elasticsearch 集群健康 / 单机与多节点风险快诊
topics:
  - elasticsearch
match_keywords:
  - elasticsearch
  - es 集群
  - cluster health
  - unassigned shard
  - yellow status
  - red status
  - 分片
  - watermark
  - heap
  - 磁盘
input:
  - base_url
  - snapshot
  - issue
analysis_steps:
  - 先读 cluster health 的 status、number_of_nodes / number_of_data_nodes、unassigned/relocating/initializing_shards
  - 区分单机（单 data 节点）黄态常见可接受场景 vs 多节点黄/红的高风险场景
  - 结合 _cat/nodes 的 heap.percent、disk.used_percent、load_1m 判断 JVM 与磁盘水位风险
  - 对 delayed_unassigned、pending_tasks 只给可执行验证动作，不展开百科
  - 若 context 含 snapshot JSON，严格基于 findings 与 raw_summary，最多补充 2 条次要风险
output_format:
  - root_cause
  - risk_summary
  - verification_commands
extra_guidance: |
  ai-sre 的 Elasticsearch 诊断目标是「最短路径判断集群/单机是否健康 + 主要隐患」，不是 Elasticsearch 教程。
  回答必须先给一句话结论（含单机/多节点判断），再列最多 5 条风险或「当前未见明显风险」。
  每条只写：证据（指标）、可能原因（一句）、一条 curl 验证或 UI 路径。
prompt_template: |
  【Elasticsearch 快诊格式】
  结论：一句话（含单机 or 多节点、绿/黄/红、最优先风险或「当前未见明显风险」）。
  1. [P0/P1/P2] 风险标题
     证据：关键指标
     可能原因：一句话
     验证：一条 curl（含 base URL）或明确动作
  若 snapshot 中 raw_summary 已说明限制（如 _cat/nodes 未采集），不要编造节点级指标。
