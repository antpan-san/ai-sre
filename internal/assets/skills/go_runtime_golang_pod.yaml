name: go_runtime_golang_pod
display_name: "Go 应用 Pod 常见异常（K8s 运行时诊断）"
topics:
  - go_runtime
  - golang
  - k8s
match_keywords:
  - go_runtime
  - golang
  - memleak
  - OOMKilled
  - CrashLoopBackOff
  - ImagePullBackOff
  - liveness
  - readiness
  - init container
input:
  - go_runtime_watch_json
  - kubectl_focus_describe
  - kubectl_focus_events
  - kubectl_focus_logs_current
  - kubectl_focus_logs_previous
  - pod
  - namespace
  - resource_kind
analysis_steps:
  - 从 describe 判断 Pod phase、容器 Waiting/Terminated 原因（ImagePullBackOff、CrashLoopBackOff、OOMKilled、Pending）
  - 对照 events 找最早 Failed/BackOff/Pulling/FailedScheduling 事件
  - 若有 logs：区分 Go 进程 OOM（137）、panic、exit 1、探针失败被杀
  - 若有 memory limit + Go 日志 alloc/sys 增长：判断堆泄漏或 limit 过低
  - 区分「业务容器镜像拉取失败」与「诊断采集器 busybox 拉取失败」
  - Init 容器非 0 退出时，主容器不会启动
  - liveness/readiness 失败时核对端口与 /health 路径
output_format:
  - 根因：（一句话，指向业务容器或基础设施）
  - 证据：（describe/events/logs 摘录）
extra_guidance: |
  常见 Go 工作负载异常对照：
  - ImagePullBackOff/ErrImagePull：镜像名/tag、内网仓库、节点无本地镜像、imagePullPolicy Never
  - CrashLoopBackOff + exit 1：启动命令错误、配置缺失、应用 main 立即 os.Exit
  - OOMKilled/exit 137：memory limit 过低或 Go 堆泄漏（日志可见 alloc/sys 持续涨）
  - Pending + FailedScheduling：CPU/memory requests 超过集群可分配
  - Running 但 NotReady：readiness 探针端口/路径与监听端口不一致
  - CrashLoop + liveness 失败：探针指向错误端口（如应用 :8080 探针 :9090）
  - Init:Error：init 容器脚本或迁移任务失败
  - 采集器失败时仍须根据目标 Pod 的 describe 给出业务侧根因，勿仅报告 busybox。
  输出禁止罗列 kubectl 命令清单；证据须来自上下文。
