# 在已将 Fusion vmnet8 改为 192.168.56.0/24 后使用（见 vmware-fusion-nat-to-192.168.56.sh）
# NAT 网关一般为 192.168.56.2（与 nat.conf 中 ip 一致）
network:
  version: 2
  ethernets:
    ens160:
      dhcp4: false
      dhcp6: false
      addresses:
        - 192.168.56.11/24
      routes:
        - to: default
          via: 192.168.56.2
      nameservers:
        addresses:
          - 8.8.8.8
          - 223.5.5.5
